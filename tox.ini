[tox]
envlist =
    py{311,312,313}
    lint
    unit
minversion = 4.22
isolated_build = true

[testenv]
deps = 
    pytest
    pytest-cov
    pytest-mock
    ops
    PyYAML
commands = 
    pytest {posargs}

[testenv:format]
description = Format code with ruff
# Use the pinned ruff/ty from the `dev` group so format, lint, pre-commit and
# CI all run identical tool versions (no unpinned drift).
dependency_groups = dev
commands =
    ruff format src tests

[testenv:lint]
description = Run linting with ruff and ty
dependency_groups = dev
commands =
    ruff check src tests
    ruff format --check src tests
    ty check src tests

[testenv:unit]
description = Run unit tests only
deps = {[testenv]deps}
commands = 
    pytest tests/ --cov=shimmer --cov-report=term-missing -m "not integration" {posargs}

[testenv:integration]
description = Run integration tests (requires pebble binary)
deps = {[testenv]deps}
commands = 
    pytest tests/ -m integration -v {posargs}
