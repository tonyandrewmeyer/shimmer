name: Publish
on:
  push:
    tags:
      - 'v*'

permissions: {}

jobs:
  # Gate the release on the full lint + unit + integration suite passing for the
  # tagged commit, so a red CI can never publish to PyPI.
  ci:
    name: CI
    uses: ./.github/workflows/ci.yaml

  build-n-publish:
    name: Build and Publish to PyPI
    needs: ci
    runs-on: ubuntu-latest
    environment: publish-pypi
    permissions:
      id-token: write
      attestations: write
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - name: Setup uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          enable-cache: false  # No build cache in the release job (cache-poisoning hardening).
      - name: Build
        run: uvx --with=build python -m build
      - name: Generate CycloneDX SBOM
        run: |
          uv sync --frozen --no-dev
          uvx --from cyclonedx-bom cyclonedx-py environment .venv \
            --output-format JSON \
            --output-file sbom.cdx.json
      - name: Attest build provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: 'dist/*'
      - name: Attest SBOM
        uses: actions/attest@v4
        with:
          subject-path: 'dist/*'
          predicate-type: 'https://cyclonedx.org/bom'
          predicate-path: 'sbom.cdx.json'
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v7
        with:
          name: sbom
          path: sbom.cdx.json
      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
