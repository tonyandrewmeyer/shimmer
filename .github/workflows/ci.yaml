name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "**" ]
  # Allow other workflows (e.g. publish.yaml) to gate on these checks.
  workflow_call:

permissions: {}

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
      with:
        persist-credentials: false

    - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0

    - run: uv tool install tox

    - name: Lint
      run: uv run tox -e lint

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]

    steps:
    - uses: actions/checkout@v7
      with:
        persist-credentials: false

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install Pebble (for integration tests)
      run: |
        sudo snap install pebble --classic --channel=latest/stable
        pebble version --client

    - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0

    - run: uv tool install tox

    - name: Run unit tests
      run: |
        uv run tox -e unit

    - name: Run integration tests
      run: |
        export PEBBLE=/tmp/pebble-test
        mkdir -p $PEBBLE/layers
        uv run tox -e integration
