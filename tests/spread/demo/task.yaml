summary: Verify demo.md is reproducible and both clients produce identical output

systems:
  - ubuntu-24.04

execute: |
  pushd "$SPREAD_PATH"

  # Start a Pebble daemon in hold mode (no autostart).
  # Use a distinct path from the /tmp/shimmer-demo* paths demo.py itself uses.
  export PEBBLE=/tmp/pebble-demo
  mkdir -p "$PEBBLE/layers"

  pebble run --hold &
  PEBBLE_PID=$!

  # Give the daemon a moment to bind its socket
  for i in $(seq 1 20); do
    pebble version 2>/dev/null && break || true
    sleep 0.5
  done

  # Re-run every code block in demo.md and diff against the captured output.
  # Fails if any command exits non-zero or if any output drifts.
  uv run uvx showboat verify demo.md

  kill "$PEBBLE_PID" || true
  wait "$PEBBLE_PID" 2>/dev/null || true

  popd

restore: |
  kill "$(cat /tmp/pebble-demo/.pebble.pid 2>/dev/null)" 2>/dev/null || true
  rm -rf /tmp/pebble-demo /tmp/shimmer-parity /tmp/shimmer-demo
