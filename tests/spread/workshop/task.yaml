summary: Verify the Workshop dev SDK launches and the unit/lint actions pass

# workshop launch creates LXD VMs; nested VMs are not supported inside the
# LXD VM the lxd backend already creates.  Run this test only on the
# github-ci backend, where LXD can be installed on bare metal.
systems:
  - ubuntu-24.04

prepare: |
  sudo snap install --channel=6/stable lxd
  sudo lxd init --auto
  sudo adduser spread lxd
  sudo snap install --classic workshop

execute: |
  pushd "$SPREAD_PATH"

  # Build the Workshop dev environment: installs pebble, syncs uv deps,
  # pre-builds tox envs, and verifies health.
  sg lxd -c 'workshop launch'

  # Exercise the SDK actions that contributors actually run.
  sg lxd -c 'workshop run dev -- unit'
  sg lxd -c 'workshop run dev -- lint'

  popd

restore: |
  pushd "$SPREAD_PATH"
  workshop remove 2>/dev/null || true
  popd
